[tool.ruff]
line-length = 100
target-version = "py314"

[tool.ruff.lint]
select = ["E", "F", "I", "W"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"src/main.py" = ["E402"]
"tests/test_config_loader.py" = ["E402"]
"tests/test_dns_resolver.py" = ["E402"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
